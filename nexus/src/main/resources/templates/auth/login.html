<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BookNexus</title>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 60px;
            color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo h1 {
            font-size: 28px;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-field::placeholder {
            color: #aaa;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn i {
            font-size: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #26a69a, #1e88e5);
            color: white;
            box-shadow: 0 4px 15px rgba(38, 166, 154, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(38, 166, 154, 0.5);
        }

        .btn-outline {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #999;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
            font-size: 14px;
            font-weight: 500;
        }

        .links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .footer-note {
            margin-top: 30px;
            color: #888;
            font-size: 13px;
        }

        .footer-note i {
            color: #ff6b6b;
        }

        .demo-credentials {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 13px;
            border-left: 4px solid #667eea;
            text-align: left;
        }

        .demo-credentials p {
            margin: 5px 0;
            color: #555;
        }

        .demo-credentials strong {
            color: #667eea;
        }

        .user-type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge-admin {
            background: #764ba2;
            color: white;
        }

        .badge-client {
            background: #26a69a;
            color: white;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <!-- Logo -->
        <div class="logo">
            <i class="bi bi-book-half"></i>
            <h1>BookNexus</h1>
            <p>Sua livraria digital completa</p>
        </div>

        <!-- Campos de entrada (apenas visuais) -->
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email"
                   id="email"
                   class="input-field"
                   placeholder="Digite seu e-mail"
                   value="cliente@email.com"
                   readonly
                   onfocus="this.blur()">
        </div>

        <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password"
                   id="senha"
                   class="input-field"
                   placeholder="Digite sua senha"
                   value="123456"
                   readonly
                   onfocus="this.blur()">
        </div>
        <!-- Links diretos -->
        <div class="btn-group">
            <a href="/home" class="btn btn-primary">
                <i class="bi bi-person-circle"></i>
                Entrar como Cliente
                <span class="user-type-badge badge-client">Cliente</span>
            </a>

            <a href="/admin" class="btn btn-secondary">
                <i class="bi bi-shield-lock"></i>
                Entrar como Admin
                <span class="user-type-badge badge-admin">Admin</span>
            </a>
        </div>

        <div class="divider">
            <span>OUTRAS OPÇÕES</span>
        </div>

        <!-- Links adicionais -->
        <div class="links">
            <a href="/admin/clientes/novo">
                <i class="bi bi-person-plus"></i> Criar conta
            </a>
            <a href="/">
                <i class="bi bi-house"></i> Loja
            </a>
        </div>

    </div>
</div>

</svg>

</body>
</html>
